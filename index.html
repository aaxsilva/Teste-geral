<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Até daqui 4 anos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pitch: #0b3d2e;
    --pitch-dark: #072a20;
    --gold: #e8b84b;
    --cream: #f4efe6;
    --whistle-red: #c1440e;
    --navy: #14213d;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0;
    padding:0;
    background: var(--pitch-dark);
    color: var(--cream);
    font-family: 'Space Grotesk', sans-serif;
    overflow-x: hidden;
  }

  /* ---------- HERO ---------- */
  .hero{
    position: relative;
    min-height: 86vh;
    display:flex;
    flex-direction: column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 6vh 6vw 8vh;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(232,184,75,0.15), transparent 60%),
      linear-gradient(180deg, var(--pitch) 0%, var(--pitch-dark) 100%);
    overflow:hidden;
  }

  .pitch-lines{
    position:absolute;
    inset:0;
    opacity:0.35;
    pointer-events:none;
  }

  .eyebrow{
    letter-spacing: 0.35em;
    text-transform: uppercase;
    font-size: 0.75rem;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 1.4rem;
    z-index:2;
  }

  .headline{
    font-family: 'Anton', sans-serif;
    font-weight: 400;
    line-height: 0.98;
    letter-spacing: 0.01em;
    font-size: clamp(2.6rem, 8vw, 6.4rem);
    color: var(--cream);
    text-transform: uppercase;
    z-index:2;
    max-width: 16ch;
  }

  .headline .accent{
    color: var(--gold);
    display:block;
  }

  .sub{
    z-index:2;
    margin-top: 1.6rem;
    font-size: clamp(1rem, 2vw, 1.2rem);
    color: rgba(244,239,230,0.75);
    max-width: 46ch;
    font-weight: 400;
  }

  .whistle{
    z-index:2;
    margin-top: 2.6rem;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--whistle-red);
    font-weight: 700;
  }

  .status-bar{
    text-align:center;
    padding: 4vh 6vw 1vh;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    color: var(--gold);
  }

  /* ---------- MOSAIC ---------- */
  .mosaic{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 28px 22px;
    padding: 3vh 5vw 10vh;
  }

  .stub{
    position:relative;
    background: var(--cream);
    border-radius: 6px;
    padding: 10px 10px 34px;
    box-shadow: 0 10px 22px rgba(0,0,0,0.35);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .stub:nth-child(3n+1){ transform: rotate(-2.2deg); }
  .stub:nth-child(3n+2){ transform: rotate(1.6deg); }
  .stub:nth-child(3n){ transform: rotate(-0.8deg); }

  .stub:hover{
    transform: scale(1.035) rotate(0deg);
    box-shadow: 0 16px 30px rgba(0,0,0,0.45);
    z-index: 5;
  }

  .stub::before{
    content:"";
    position:absolute;
    left:-1px; right:-1px; bottom:26px;
    border-top: 2px dashed rgba(11,61,46,0.35);
  }

  .stub-media{
    width:100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    border-radius: 3px;
    display:block;
    background: #ddd;
  }

  .stub-caption{
    position:absolute;
    bottom:8px; left:10px; right:10px;
    display:flex;
    justify-content:space-between;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--pitch);
    font-weight: 700;
    opacity: 0.65;
  }

  /* ---------- CONFETTI ---------- */
  .confetti-piece{
    position:fixed;
    top:-20px;
    width:8px; height:14px;
    opacity:0.9;
    pointer-events:none;
    z-index: 999;
    animation: fall linear forwards;
  }

  @keyframes fall{
    to{
      transform: translateY(110vh) rotate(540deg);
      opacity: 0.2;
    }
  }

  footer{
    text-align:center;
    padding: 3vh 6vw 6vh;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(244,239,230,0.35);
  }

  @media (prefers-reduced-motion: reduce){
    .confetti-piece{ animation: none; display:none; }
    .stub{ transition: none; }
  }

  .stub-media{ cursor: zoom-in; }

  /* ---------- LIGHTBOX ---------- */
  .lightbox-overlay{
    position: fixed;
    inset: 0;
    background: rgba(7,42,32,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 4vh 4vw;
  }

  .lightbox-overlay.open{
    display: flex;
  }

  .lightbox-content{
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    max-width: 92vw;
    max-height: 92vh;
  }

  .lightbox-content img,
  .lightbox-content video{
    max-width: 92vw;
    max-height: 92vh;
    width: auto;
    height: auto;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .lightbox-close{
    position: absolute;
    top: -18px;
    right: -18px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--gold);
    color: var(--pitch-dark);
    border: none;
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    transition: transform 0.15s ease;
  }

  .lightbox-close:hover{
    transform: scale(1.08);
  }

  @media (max-width: 700px){
    .lightbox-content{ max-width: 96vw; max-height: 96vh; }
    .lightbox-close{ top: -14px; right: 0; }
  }
</style>
</head>
<body>

<section class="hero">
  <svg class="pitch-lines" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice">
    <circle cx="500" cy="600" r="220" fill="none" stroke="#f4efe6" stroke-width="2"/>
    <line x1="0" y1="0" x2="1000" y2="0" stroke="#f4efe6" stroke-width="2"/>
    <rect x="380" y="0" width="240" height="90" fill="none" stroke="#f4efe6" stroke-width="2"/>
  </svg>
  <div class="eyebrow">Bolão Copa 2026 · Final apitada</div>
  <h1 class="headline">Valeu, time!<span class="accent">...até daqui 4 anos</span></h1>
  <p class="sub">Foram fases eliminatórias inteiras de palpite, brincadeira e resenha no grupo. Guardamos aqui os melhores momentos da despedida.</p>
  <div class="whistle">⚽ Fim de jogo</div>
</section>

<div class="status-bar" id="status"></div>

<div class="mosaic" id="mosaic"></div>

<div class="lightbox-overlay" id="lightboxOverlay">
  <div class="lightbox-content" id="lightboxContent">
    <button class="lightbox-close" id="lightboxClose" aria-label="Fechar">✕</button>
  </div>
</div>

<footer>Feito com carinho para o grupo do bolão</footer>

<script>
// Arquivos fixos, na mesma pasta deste HTML, em ordem cronológica
const MEDIA = [
  { file: "images/WhatsApp Image 2026-07-05 at 17.56.18.jpeg", type: "image" },
  { file: "images/WhatsApp Image 2026-07-05 at 18.00.20.jpeg", type: "image" },
  { file: "images/WhatsApp Image 2026-07-09 at 13.43.46.jpeg", type: "image" },
  { file: "images/WhatsApp Image 2026-07-09 at 14.00.52.jpeg", type: "image" },
  { file: "images/WhatsApp Video 2026-07-17 at 07.12.31.mp4", type: "video" },
  { file: "images/WhatsApp Image 2026-07-18 at 12.17.52.jpeg", type: "image" },
  { file: "images/WhatsApp Video 2026-07-19 at 18.32.45.mp4", type: "video" },
  { file: "images/WhatsApp Video 2026-07-19 at 19.02.16.mp4", type: "video" },
  { file: "images/WhatsApp Image 2026-07-19 at 19.04.30.jpeg", type: "image" },
  { file: "images/WhatsApp Image 2026-07-19 at 19.06.49.jpeg", type: "image" },
  { file: "images/WhatsApp Image 2026-07-19 at 19.08.10.jpeg", type: "image" },
  { file: "images/WhatsApp Video 2026-07-19 at 19.09.24.mp4", type: "video" },
  { file: "images/WhatsApp Video 2026-07-19 at 19.30.53.mp4", type: "video" },
  { file: "images/WhatsApp Image 2026-07-19 at 19.30.59.jpeg", type: "image" },
  { file: "images/WhatsApp Image 2026-07-19 at 20.08.18.jpeg", type: "image" },
  { file: "images/WhatsApp Image 2026-07-19 at 20.56.26.jpeg", type: "image" },
  { file: "images/WhatsApp Image 2026-07-22 at 19.05.08.jpeg", type: "image" },
  { file: "images/WhatsApp Video 2026-07-22 at 19.07.43.mp4", type: "video" },
  { file: "images/WhatsApp Image 2026-07-22 at 19.07.43.jpeg", type: "image" },
  { file: "images/WhatsApp Image 2026-07-22 at 19.07.43 (1).jpeg", type: "image" },
  { file: "images/WhatsApp Image 2026-07-22 at 19.07.43 (2).jpeg", type: "image" }
];

const mosaic = document.getElementById('mosaic');
const status = document.getElementById('status');

status.textContent = `${MEDIA.length} lembranças da despedida 🎉`;

MEDIA.forEach((item, i) => {
  const stub = document.createElement('div');
  stub.className = 'stub';

  const media = document.createElement(item.type === 'video' ? 'video' : 'img');
  media.className = 'stub-media';
  media.src = encodeURI(item.file);
  if (item.type === 'video'){
    media.controls = true;
    media.muted = true;
    media.playsInline = true;
    media.loop = true;
  } else {
    media.loading = 'lazy';
    media.alt = item.file;
  }

  const caption = document.createElement('div');
  caption.className = 'stub-caption';
  caption.innerHTML = `<span>Nº ${String(i + 1).padStart(3, '0')}</span><span>${item.type === 'video' ? 'Vídeo' : 'Foto'}</span>`;

  media.addEventListener('click', () => openLightbox(item));

  stub.appendChild(media);
  stub.appendChild(caption);
  mosaic.appendChild(stub);
});

// ---------- LIGHTBOX ----------
const lightboxOverlay = document.getElementById('lightboxOverlay');
const lightboxContent = document.getElementById('lightboxContent');
const lightboxClose = document.getElementById('lightboxClose');

function openLightbox(item){
  const el = document.createElement(item.type === 'video' ? 'video' : 'img');
  el.src = encodeURI(item.file);
  if (item.type === 'video'){
    el.controls = true;
    el.autoplay = true;
    el.playsInline = true;
  } else {
    el.alt = item.file;
  }
  const existingMedia = lightboxContent.querySelector('img, video');
  if (existingMedia) existingMedia.remove();
  lightboxContent.insertBefore(el, lightboxClose);
  lightboxOverlay.classList.add('open');
}

function closeLightbox(){
  const playing = lightboxContent.querySelector('video');
  if (playing) playing.pause();
  lightboxOverlay.classList.remove('open');
}

lightboxClose.addEventListener('click', closeLightbox);
lightboxOverlay.addEventListener('click', (e) => {
  if (e.target === lightboxOverlay) closeLightbox();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeLightbox();
});

function launchConfetti(){
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const colors = ['#e8b84b', '#0b3d2e', '#f4efe6', '#c1440e'];
  for (let i = 0; i < 60; i++){
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (2.5 + Math.random() * 2) + 's';
    piece.style.animationDelay = (Math.random() * 0.6) + 's';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 5000);
  }
}

launchConfetti();
</script>

</body>
</html>
