<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificação Global: TOP 10</title>
    <style>
        :root {
            --bg-main: #020b24;
            --bg-card: #041635;
            --border-highlight: #d4af37;
            --text-color: #ffffff;
            --rank-1: #f3cc61;
            --rank-2: #a1b3cb;
            --rank-3: #ca814e;
            --rank-other: #e25c5c;
            --rank-6: #9aa8bd;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .leaderboard-container {
            background-color: var(--bg-card);
            border: 2px solid #0d3263;
            border-radius: 16px;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 2px solid #0d3263;
            padding-bottom: 15px;
        }

        .header-icon {
            display: flex;
            gap: 4px;
            align-items: flex-end;
            height: 32px;
        }

        .header-icon span {
            width: 8px;
            border-radius: 2px;
        }
        .header-icon span:nth-child(1) { height: 15px; background: #3fa1e3; }
        .header-icon span:nth-child(2) { height: 28px; background: #2cb7a9; }
        .header-icon span:nth-child(3) { height: 20px; background: #9b51e0; }

        .header h1 {
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .header h1 span {
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
            font-size: 1.1rem;
        }

        .rank-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .rank-item {
            display: flex;
            align-items: center;
            background-color: #031c44;
            padding: 10px 15px;
            border-radius: 12px;
            gap: 15px;
            border: 1px solid transparent;
        }

        /* Destaque para o primeiro colocado */
        .rank-item.top1 {
            border-color: var(--border-highlight);
            box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .position {
            font-size: 1.8rem;
            font-weight: 800;
            width: 50px;
            text-align: center;
        }

        .top1 .position { color: var(--rank-1); }
        .top2 .position { color: var(--rank-2); }
        .top3 .position { color: var(--rank-3); }
        .top4 .position { color: var(--rank-other); }
        .top5 .position { color: var(--rank-other); }
        .top6 .position { color: var(--rank-6); }

        .thumbnail-wrapper {
            position: relative;
            width: 70px;
            height: 70px;
            border-radius: 12px;
            padding: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Gradientes das bordas das imagens */
        .top1 .thumbnail-wrapper { background: linear-gradient(135deg, #a855f7, #06b6d4, #10b981); }
        .top2 .thumbnail-wrapper { background: linear-gradient(135deg, #3b82f6, #06b6d4, #10b981); }
        .top3 .thumbnail-wrapper { background: linear-gradient(135deg, #ec4899, #f43f5e, #a855f7); }
        .top4 .thumbnail-wrapper { background: linear-gradient(135deg, #3b82f6, #a855f7); }
        .top5 .thumbnail-wrapper { background: linear-gradient(135deg, #f43f5e, #eab308); }
        .top6 .thumbnail-wrapper { background: linear-gradient(135deg, #06b6d4, #3b82f6); }

        .thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 9px;
            background-color: #111;
        }

        .info-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .progress-bar-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .progress-track {
            background-color: #020b24;
            height: 12px;
            border-radius: 6px;
            flex-grow: 1;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 6px;
        }

        /* Cores das barras de progresso */
        .top1 .progress-fill { background: linear-gradient(90deg, #ec4899, #a855f7, #10b981); width: 93%; }
        .top2 .progress-fill { background: linear-gradient(90deg, #3b82f6, #06b6d4, #10b981); width: 87%; }
        .top3 .progress-fill { background: linear-gradient(90deg, #b45309, #f59e0b); width: 81%; }
        .top4 .progress-fill { background: linear-gradient(90deg, #dc2626, #f97316); width: 76%; }
        .top5 .progress-fill { background: linear-gradient(90deg, #db2777, #f97316); width: 68%; }
        .top6 .progress-fill { background: linear-gradient(90deg, #64748b, #cbd5e1); width: 69%; }

        .percentage {
            font-size: 1.1rem;
            font-weight: 700;
            min-width: 45px;
            text-align: right;
        }
        
        .top1 .percentage { color: var(--rank-1); }
    </style>
</head>
<body>

    <div class="leaderboard-container">
        <div class="header">
            <div class="header-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <h1>Classificação Global: TOP 10</h1>
        </div>

        <div class="rank-list">
            <!-- #1 Adriano -->
            <div class="rank-item top1">
                <div class="position">#1</div>
                <div class="thumbnail-wrapper">
                    <img class="thumbnail" src="Adriano.jpg" alt="Adriano">
                </div>
                <div class="info-container">
                    <div class="title">Adriano</div>
                    <div class="progress-bar-wrapper">
                        <div class="progress-track"><div class="progress-fill"></div></div>
                        <div class="percentage">93%</div>
                    </div>
                </div>
            </div>

            <!-- #2 Cachorro Husky Feliz -->
            <div class="rank-item top2">
                <div class="position">#2</div>
                <div class="thumbnail-wrapper">
                    <img class="thumbnail" src="https://images.unsplash.com/photo-1531804055935-76f44d7c3621?w=150&auto=format&fit=crop" alt="Cachorro Husky Feliz">
                </div>
                <div class="info-container">
                    <div class="title">Cachorro Husky Feliz</div>
                    <div class="progress-bar-wrapper">
                        <div class="progress-track"><div class="progress-fill"></div></div>
                        <div class="percentage">87%</div>
                    </div>
                </div>
            </div>

            <!-- #3 Fatia de Pizza Deliciosa -->
            <div class="rank-item top3">
                <div class="position">#3</div>
                <div class="thumbnail-wrapper">
                    <img class="thumbnail" src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=150&auto=format&fit=crop" alt="Fatia de Pizza Deliciosa">
                </div>
                <div class="info-container">
                    <div class="title">Fatia de Pizza Deliciosa</div>
                    <div class="progress-bar-wrapper">
                        <div class="progress-track"><div class="progress-fill"></div></div>
                        <div class="percentage">81%</div>
                    </div>
                </div>
            </div>

            <!-- #4 Carro Clássico Vermelho -->
            <div class="rank-item top4">
                <div class="position">#4</div>
                <div class="thumbnail-wrapper">
                    <img class="thumbnail" src="https://images.unsplash.com/photo-1525609004556-c46c7d6cf0a3?w=150&auto=format&fit=crop" alt="Carro Clássico Vermelho">
                </div>
                <div class="info-container">
                    <div class="title">Carro Clássico Vermelho</div>
                    <div class="progress-bar-wrapper">
                        <div class="progress-track"><div class="progress-fill"></div></div>
                        <div class="percentage">76%</div>
                    </div>
                </div>
            </div>

            <!-- #5 Leitora com Livro (Carro na Imagem) -->
            <div class="rank-item top5">
                <div class="position">#5</div>
                <div class="thumbnail-wrapper">
                    <!-- Nota: O texto diz "Leitora com Livro", mas a imagem mostra outro carro clássico laranja -->
                    <img class="thumbnail" src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c?w=150&auto=format&fit=crop" alt="Carro Laranja">
                </div>
                <div class="info-container">
                    <div class="title">Leitora com Livro</div>
                    <div class="progress-bar-wrapper">
                        <div class="progress-track"><div class="progress-fill"></div></div>
                        <div class="percentage">68%</div>
                    </div>
                </div>
            </div>

            <!-- #6 Leitora com Livro -->
            <div class="rank-item top6">
                <div class="position">#6</div>
                <div class="thumbnail-wrapper">
                    <img class="thumbnail" src="https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=150&auto=format&fit=crop" alt="Leitora com Livro">
                </div>
                <div class="info-container">
                    <div class="title">Leitora com Livro</div>
                    <div class="progress-bar-wrapper">
                        <div class="progress-track"><div class="progress-fill"></div></div>
                        <div class="percentage">69%</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
